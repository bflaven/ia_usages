# item_ntlk.yaml — Wikidata item definition for NLTK
# Edit only the VALUES — do NOT rename any key (label_en, label, qid, etc.)
# Lines starting with # are comments and are ignored by the script.

# ── Basic information ─────────────────────────────────────────────────────────

label_en: "NLTK"

description_en: "open-source Python platform for building natural language processing programs, providing interfaces to corpora and lexical resources, text processing libraries for classification, tokenization, stemming, tagging, parsing and semantic reasoning"

aliases_en:
  - "Natural Language Toolkit"
  - "NLTK Python"
  - "Python NLP Library"
  - "Natural Language Processing Toolkit"

# ── Statements (claims) ───────────────────────────────────────────────────────
# You do not need to know the QID.
# The script will search Wikidata automatically using the label.
# It will print what it found so you can verify before running on production.
#
# If you DO know the QID, add it as:  qid: "Q12345"
# and it will be used directly without searching.
#
# Note: search takes the FIRST result — check the printed output carefully.

# P279 — "subclass of": what broader category does this item belong to?
subclass_of:
  - label: "natural language processing"
  - label: "software library"
  - label: "free and open-source software"

# P2283 — "uses": what technologies or tools does this item rely on?
uses:
  - label: "Python"
  - label: "WordNet"
  - label: "text corpus"

# P856 — official website (must start with https://)
official_website: "https://www.nltk.org/"
