# Validation keywords in English
# Used for automatic detection of relevant content in documents
validation_keywords:
  positive:
    - "compliant"
    - "satisfactory"
    - "excellent"
    - "relevant"
    - "suitable"
    - "complete"
    - "detailed"
    - "consistent"
    - "innovative"
    - "effective"
  negative:
    - "non-compliant"
    - "insufficient"
    - "incomplete"
    - "unsuitable"
    - "missing"
    - "gap"
    - "weak"
    - "vague"
    - "lacking"
    - "outdated"
  technical:
    - "methodology"
    - "schedule"
    - "team"
    - "profile"
    - "experience"
    - "reference"
    - "qualification"
    - "certification"
    - "resources"
    - "organization"
  financial:
    - "unit price"
    - "amount"
    - "total excl. tax"
    - "cost"
    - "rate"
    - "lump sum"
    - "discount"
    - "rebate"
