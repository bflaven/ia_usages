# Mots-cles de validation en francais
# Utilises pour la detection automatique de contenu pertinent dans les documents
validation_keywords:
  positif:
    - "conforme"
    - "satisfaisant"
    - "excellent"
    - "pertinent"
    - "adapte"
    - "complet"
    - "detaille"
    - "coherent"
    - "innovant"
    - "performant"
  negatif:
    - "non conforme"
    - "insuffisant"
    - "incomplet"
    - "inadapte"
    - "absent"
    - "lacune"
    - "faible"
    - "imprecis"
    - "manquant"
    - "obsolete"
  technique:
    - "methodologie"
    - "planning"
    - "equipe"
    - "profil"
    - "experience"
    - "reference"
    - "qualification"
    - "certification"
    - "moyens"
    - "organisation"
  financier:
    - "prix unitaire"
    - "montant"
    - "total HT"
    - "cout"
    - "tarif"
    - "forfait"
    - "remise"
    - "rabais"
